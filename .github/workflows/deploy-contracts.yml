name: Deploy Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        type: choice
        options:
          - sepolia
          - mainnet
      dry_run:
        description: 'Dry run (simulate only)'
        required: false
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build

      - name: Run tests
        run: forge test -vvv

      - name: Deploy (${{ inputs.network }})
        if: ${{ !inputs.dry_run }}
        run: |
          forge script script/Deploy.s.sol:Deploy \
            --rpc-url "$RPC_URL" \
            --broadcast \
            --verify \
            --etherscan-api-key "$ETHERSCAN_API_KEY" \
            -vvv
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.RPC_URL }}
          EAS_ADDRESS: ${{ inputs.network == 'mainnet' && '0xA1207F3BBa224E2c9c3c6D5aF63D0eb1582Ce587' || '0xC2679fBD37d54388Ce493F1DB75320D236e1815e' }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: Simulate (${{ inputs.network }})
        if: ${{ inputs.dry_run }}
        run: |
          forge script script/Deploy.s.sol:Deploy \
            --rpc-url "$RPC_URL" \
            -vvv
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.RPC_URL }}
          EAS_ADDRESS: ${{ inputs.network == 'mainnet' && '0xA1207F3BBa224E2c9c3c6D5aF63D0eb1582Ce587' || '0xC2679fBD37d54388Ce493F1DB75320D236e1815e' }}
