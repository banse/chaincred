# Dev: docker compose up
# Prod: docker compose --profile prod up
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: chaincred
      POSTGRES_PASSWORD: chaincred
      POSTGRES_DB: chaincred
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chaincred']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Dev services (bind-mount source for hot reload) ──

  migrate:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    command: bun run migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chaincred:chaincred@postgres:5432/chaincred

  api:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    command: bun run --hot packages/api/src/app.ts
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: '3001'
      DATABASE_URL: postgresql://chaincred:chaincred@postgres:5432/chaincred
      REDIS_URL: redis://redis:6379
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      PINATA_API_KEY: ${PINATA_API_KEY:-}
      PINATA_API_SECRET: ${PINATA_API_SECRET:-}

  indexer:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    command: bun run packages/indexer/src/index.ts
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://chaincred:chaincred@postgres:5432/chaincred

  # ── Merkle tree generation (run manually: docker compose run merkle-gen) ──

  merkle-gen:
    profiles: ['tools']
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    command: bun run packages/api/src/scripts/generate-merkle.ts
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://chaincred:chaincred@postgres:5432/chaincred
      PINATA_API_KEY: ${PINATA_API_KEY:-}
      PINATA_API_SECRET: ${PINATA_API_SECRET:-}

  # ── E2E testing (Anvil mainnet fork) ──

  anvil:
    profiles: ['e2e']
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ['anvil']
    command:
      [
        '--host', '0.0.0.0',
        '--port', '8545',
        '--chain-id', '1',
        '--accounts', '3',
        '--balance', '10000',
      ]
    ports:
      - '8545:8545'
    healthcheck:
      test: ['CMD', 'cast', 'block-number', '--rpc-url', 'http://localhost:8545']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Production services (built images, no bind-mounts) ──

  migrate-prod:
    profiles: ['prod']
    build:
      context: .
      target: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chaincred:chaincred@postgres:5432/chaincred

  api-prod:
    profiles: ['prod']
    build:
      context: .
      target: api
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-prod:
        condition: service_completed_successfully
    environment:
      PORT: '3001'
      DATABASE_URL: postgresql://chaincred:chaincred@postgres:5432/chaincred
      REDIS_URL: redis://redis:6379

  indexer-prod:
    profiles: ['prod']
    build:
      context: .
      target: indexer
    depends_on:
      postgres:
        condition: service_healthy
      migrate-prod:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://chaincred:chaincred@postgres:5432/chaincred

volumes:
  pgdata:
